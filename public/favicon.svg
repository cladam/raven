<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#121212"/>

  <!-- Grid cells (3×3) -->
  <!-- Row 1 -->
  <rect x="6" y="6" width="14" height="14" rx="2" fill="#f0ede8"/>
  <rect x="25" y="6" width="14" height="14" rx="2" fill="#f0ede8"/>
  <rect x="44" y="6" width="14" height="14" rx="2" fill="#f0ede8"/>

  <!-- Row 2 -->
  <rect x="6" y="25" width="14" height="14" rx="2" fill="#f0ede8"/>
  <rect x="25" y="25" width="14" height="14" rx="2" fill="#f0ede8"/>
  <rect x="44" y="25" width="14" height="14" rx="2" fill="#f0ede8"/>

  <!-- Row 3 -->
  <rect x="6" y="44" width="14" height="14" rx="2" fill="#f0ede8"/>
  <rect x="25" y="44" width="14" height="14" rx="2" fill="#f0ede8"/>

  <!-- Missing cell (bottom-right) with dashed border -->
  <rect x="44" y="44" width="14" height="14" rx="2" fill="#1e1e1e" stroke="#5a9b80" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- Shapes in cells -->
  <!-- Row 1: circle, square, triangle -->
  <circle cx="13" cy="13" r="4.5" fill="#222222"/>
  <rect x="28.5" y="9.5" width="7" height="7" fill="#999999"/>
  <polygon points="51,8 46,18 56,18" fill="#ffffff" stroke="#333333" stroke-width="0.8"/>

  <!-- Row 2: triangle, circle, square -->
  <polygon points="13,21 8,35 18,35" fill="#999999"/>
  <circle cx="32" cy="32" r="4.5" fill="#ffffff" stroke="#333333" stroke-width="0.8"/>
  <rect x="48" y="28.5" width="7" height="7" fill="#222222"/>

  <!-- Row 3: square, triangle, ? -->
  <rect x="9.5" y="47.5" width="7" height="7" fill="#ffffff" stroke="#333333" stroke-width="0.8"/>
  <polygon points="32,46 27,56 37,56" fill="#222222"/>

  <!-- Question mark in missing cell -->
  <text x="51" y="55" font-family="sans-serif" font-size="11" font-weight="800" fill="#5a9b80" text-anchor="middle">?</text>
</svg>
